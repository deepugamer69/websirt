<!DOCTYPE html>
<html>
<head>
    <title>Contact MUFC</title>
    <style>
        /* Minimal CSS */
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
        }
        h1 { color: #C70101; }
        
        /* Making the form stack vertically */
        input, textarea {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            padding: 8px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
        }
        
        button {
            background: #C70101;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Contact Us</h1>
    
    <form>
        <label>Name:</label>
        <input type="text" name="name">

        <label>Email:</label>
        <input type="email" name="email">

        <label>Message:</label>
        <textarea name="message"></textarea>

        <button type="submit">Send</button>
    </form>

</body>
</html>
